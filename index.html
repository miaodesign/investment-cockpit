<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投资驾驶舱 - 完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e6e6e6; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1f2e 0%, #2d3748 100%); padding: 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2d3748; }
        .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
        .status-bar { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #888; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffd93d; animation: pulse 2s infinite; }
        .status-dot.connected { background: #6bcb77; animation: none; }
        .status-dot.error { background: #ff6b6b; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .container { padding: 16px; max-width: 800px; margin: 0 auto; }
        .card { background: #1a1f2e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #2d3748; }
        .card-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .metric { background: #0f1419; padding: 16px; border-radius: 8px; text-align: center; border: 1px solid #2d3748; }
        .metric-label { font-size: 11px; color: #666; margin-bottom: 4px; }
        .metric-value { font-size: 20px; font-weight: 700; color: #fff; }
        .metric-value.up { color: #ff6b6b; }
        .metric-value.down { color: #6bcb77; }
        .holding-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2d3748; }
        .holding-item:last-child { border-bottom: none; }
        .holding-name { font-weight: 600; font-size: 14px; color: #fff; }
        .holding-code { font-size: 11px; color: #666; margin-top: 2px; }
        .holding-pnl { text-align: right; }
        .holding-pnl-value { font-weight: 700; font-size: 14px; }
        .holding-pnl-value.up { color: #ff6b6b; }
        .holding-pnl-value.down { color: #6bcb77; }
        .holding-pnl-pct { font-size: 11px; color: #666; margin-top: 2px; }
        .decision-item { padding: 12px; background: #0f1419; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #667eea; }
        .decision-priority { font-size: 10px; color: #888; margin-bottom: 4px; }
        .decision-action { font-weight: 600; font-size: 14px; color: #fff; }
        .decision-reason { font-size: 12px; color: #888; margin-top: 4px; }
        .env-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #667eea; color: #fff; }
        .env-card { background: #0f1419; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        .env-label { font-size: 12px; color: #666; }
        .env-value { font-size: 14px; font-weight: 600; color: #667eea; }
        .tab-bar { display: flex; gap: 0; margin-bottom: 16px; background: #1a1f2e; border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; border: none; background: none; transition: all 0.2s; }
        .tab.active { color: #fff; background: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn { background: #667eea; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: #5a6fd6; }
        .btn:active { transform: scale(0.98); }
        .loading { text-align: center; padding: 60px 20px; color: #666; }
        .loading::after { content: ''; display: block; width: 30px; height: 30px; border: 3px solid #667eea; border-top-color: transparent; border-radius: 50%; margin: 20px auto 0; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { background: #2d1f1f; color: #ff6b6b; padding: 16px; border-radius: 8px; text-align: center; margin: 16px; border: 1px solid #ff6b6b; }
        #lastUpdate { text-align: center; color: #666; font-size: 11px; margin-top: 16px; padding-bottom: 30px; }
        .section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .kpi-item { background: #0f1419; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #2d3748; }
        .kpi-value { font-size: 18px; font-weight: 700; }
        .kpi-value.green { color: #6bcb77; }
        .kpi-value.red { color: #ff6b6b; }
        .kpi-label { font-size: 11px; color: #666; margin-top: 2px; }
        .risk-bar { height: 8px; background: #2d3748; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .risk-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .risk-fill.green { background: #6bcb77; }
        .risk-fill.yellow { background: #f0ad4e; }
        .risk-fill.red { background: #ff6b6b; }
    </style>
</head>
<body>
    <div class="header">
        <h1>投资驾驶舱</h1>
        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">连接中...</span>
        </div>
    </div>

    <div class="container">
        <div id="loading" class="loading">加载数据中</div>
        <div id="error" class="error-box" style="display:none;"></div>
        
        <div id="content" style="display:none;">
            <div class="card">
                <div class="card-title">资产概览</div>
                <div class="metric-grid">
                    <div class="metric">
                        <div class="metric-label">总资产</div>
                        <div class="metric-value" id="totalAssets">--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">总盈亏</div>
                        <div class="metric-value" id="totalPnl">--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">今日盈亏</div>
                        <div class="metric-value" id="todayPnl">--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">仓位</div>
                        <div class="metric-value" id="position">--</div>
                    </div>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab active" onclick="switchTab('holdings')">持仓</button>
                <button class="tab" onclick="switchTab('decision')">决策</button>
                <button class="tab" onclick="switchTab('analysis')">分析</button>
            </div>

            <div id="tab-holdings" class="tab-content active">
                <div class="card">
                    <div class="card-title">持仓明细</div>
                    <div id="holdings"></div>
                </div>
            </div>

            <div id="tab-decision" class="tab-content">
                <div class="card">
                    <div class="card-title">市场环境 <span class="env-badge" id="envBadge">--</span></div>
                    <div class="env-card">
                        <div><div class="env-label">市场评分</div><div class="env-value" id="envScore">--</div></div>
                        <div><div class="env-label">仓位上限</div><div class="env-value" id="positionLimit">--</div></div>
                        <div><div class="env-label">信号</div><div class="env-value" id="signal">--</div></div>
                    </div>
                    <div class="section-title" style="margin-top:16px;">操作建议</div>
                    <div id="decisions"></div>
                </div>
            </div>

            <div id="tab-analysis" class="tab-content">
                <div class="card">
                    <div class="card-title">关键指标</div>
                    <div class="kpi-grid" id="kpiGrid"></div>
                </div>
                <div class="card">
                    <div class="card-title">风险预算</div>
                    <div style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;"><span>已用</span><span id="riskUsed">--</span></div>
                        <div class="risk-bar"><div class="risk-fill" id="riskBar" style="width:0%"></div></div>
                    </div>
                    <div id="riskBreakdown" style="display:flex;justify-content:space-between;font-size:12px;color:#888;"></div>
                </div>
                <div class="card">
                    <div class="card-title">市场维度</div>
                    <div id="dimensions"></div>
                </div>
            </div>

            <div class="card">
                <button class="btn" id="refreshBtn">刷新数据</button>
            </div>

            <div id="lastUpdate"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const fmt = (n) => n ? n.toLocaleString('zh-CN') : '--';
        const fmtPct = (n) => n ? ((n >= 0 ? '+' : '') + n.toFixed(2) + '%') : '--';

        function setStatus(type, text) {
            document.getElementById('statusDot').className = 'status-dot ' + type;
            document.getElementById('statusText').textContent = text;
        }

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            setStatus('', '加载中...');

            try {
                const [portfolioRes, decisionRes] = await Promise.all([
                    fetch(API_BASE + '/portfolio').then(r => r.json()).catch(() => ({ success: false })),
                    fetch(API_BASE + '/decision-engine').then(r => r.json()).catch(() => ({ success: false }))
                ]);

                if (!portfolioRes.success) throw new Error('Portfolio加载失败');

                renderPortfolio(portfolioRes.data);
                renderDecision(decisionRes.data);
                
                setStatus('connected', '已连接');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error('加载失败:', e);
                setStatus('error', '连接失败');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = '加载失败: ' + e.message + '<br><br><button class="btn" onclick="loadData()">重试</button>';
            }
        }

        function renderPortfolio(data) {
            const t = data.totals || {};
            document.getElementById('totalAssets').textContent = '¥' + fmt(t.total_assets);
            
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (t.total_pnl >= 0 ? '+' : '') + '¥' + fmt(t.total_pnl);
            pnlEl.className = 'metric-value ' + (t.total_pnl >= 0 ? 'up' : 'down');
            
            const todayEl = document.getElementById('todayPnl');
            todayEl.textContent = (t.today_pnl >= 0 ? '+' : '') + '¥' + fmt(t.today_pnl);
            todayEl.className = 'metric-value ' + (t.today_pnl >= 0 ? 'up' : 'down');
            
            document.getElementById('position').textContent = (t.position_pct || '--') + '%';

            let h = '';
            (data.accounts || []).forEach(acc => {
                (acc.stocks || []).forEach(s => {
                    h += '<div class="holding-item"><div><div class="holding-name">' + (s.name || s.Name) + '</div><div class="holding-code">' + acc.label + ' · ' + s.code + ' · ' + s.qty + '股</div></div><div class="holding-pnl"><div class="holding-pnl-value ' + (s.pnl >= 0 ? 'up' : 'down') + '">' + (s.pnl >= 0 ? '+' : '') + '¥' + fmt(s.pnl) + '</div><div class="holding-pnl-pct">' + fmtPct(s.pnlPct) + ' · ¥' + s.price.toFixed(2) + '</div></div></div>';
                });
            });
            document.getElementById('holdings').innerHTML = h || '<div style="color:#666;text-align:center;padding:20px;">暂无持仓</div>';
        }

        function renderDecision(data) {
            if (!data) return;
            const env = data.market_env || {};
            document.getElementById('envBadge').textContent = env.level || '--';
            document.getElementById('envScore').textContent = env.score || '--';
            document.getElementById('positionLimit').textContent = (env.position_limit || '--') + '%';
            document.getElementById('signal').textContent = data.signal || '--';

            let d = '';
            (data.suggestions || []).slice(0, 5).forEach(s => {
                d += '<div class="decision-item"><div class="decision-priority">优先级: ' + s.priority + '</div><div class="decision-action">' + s.action + '</div><div class="decision-reason">' + s.reason + '</div></div>';
            });
            document.getElementById('decisions').innerHTML = d || '<div style="color:#666;">暂无建议</div>';

            // KPI
            const kpi = data.kpi || {};
            let k = '';
            Object.entries(kpi).forEach(([key, v]) => {
                k += '<div class="kpi-item"><div class="kpi-value ' + (v.color || 'green') + '">' + (v.type === 'percent' ? v.value + '%' : v.value) + '</div><div class="kpi-label">' + v.label + '</div></div>';
            });
            document.getElementById('kpiGrid').innerHTML = k;

            // 风险预算
            const risk = data.cross_risk || {};
            const exposure = risk.exposure || {};
            const used = Object.values(exposure).reduce((a, b) => a + b, 0);
            document.getElementById('riskUsed').textContent = used + '%';
            document.getElementById('riskBar').style.width = used + '%';
            document.getElementById('riskBar').className = 'risk-fill ' + (used > 80 ? 'red' : used > 60 ? 'yellow' : 'green');
            
            let rb = '';
            Object.entries(exposure).forEach(([k, v]) => { rb += '<span>' + k + ' ' + v + '%</span>'; });
            document.getElementById('riskBreakdown').innerHTML = rb;

            // 市场维度
            const dims = env.dimensions || {};
            let dimHtml = '';
            Object.entries(dims).forEach(([k, v]) => {
                dimHtml += '<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:13px;"><span>' + k + '</span><span style="color:#667eea;font-weight:600;">' + v.status + ' ' + v.score + '</span></div><div class="risk-bar"><div class="risk-fill ' + (v.score > 70 ? 'green' : v.score > 50 ? 'yellow' : 'red') + '" style="width:' + v.score + '%"></div></div></div>';
            });
            document.getElementById('dimensions').innerHTML = dimHtml;
        }

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
        }

        document.getElementById('refreshBtn').addEventListener('click', loadData);
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
